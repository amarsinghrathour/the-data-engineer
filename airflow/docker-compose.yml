version: "3"

services:
  airflow:
    image: apache/airflow:2.7.0
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=requests psycopg2-binary
      # If Postgres runs on your machine and Airflow is in Docker, uncomment:
      # - POSTGRES_HOST=host.docker.internal
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ../projects/batch_pipeline:/opt/airflow/projects/batch_pipeline
    command: standalone
